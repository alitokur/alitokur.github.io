		<div id="info">
			<a href="https://spaceport.tv/" target="_blank" rel="noopener">Spaceport</a> Volumetric Web Video Player<br />
			<p>
				Spaceport, next-generation video technology, is an end-to-end Volumetric Video Capturing and Streaming solution. Compatible with mobile devices, browsers, and VR goggles.

    <script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.121.1/build/three.module.js';
import { DRACOLoader } from 'https://cdn.jsdelivr.net/npm/three@0.121.1/examples/jsm/loaders/DRACOLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.121.1/examples/jsm/controls/OrbitControls.js';
        
      // Configure decoder and create loader.
      var textureLoader = new THREE.TextureLoader();
      const loadManager = new THREE.LoadingManager();
      
          
      const meshes = [];
      const allTextures  = [];
      const allMaterials = [];
      const drcMeshes = [];
      const totalFrame = 190;
      const allAudio = [];
      const timeStamps = [];
  
      var camera, cameraTarget, scene, renderer, controls;
      let currentIndex = null;
      var flag = 0;
      var numberContainer = 0;
      var bar = 0;
      var replay = 1;
      var createIndex = 0;
      var mainArray = new Uint8Array(0);
      var  source;
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function init() {
      
        var container = document.createElement('div');
        document.body.appendChild(container);

        //camera
        camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 1, 15);
        camera.position.set(3, 0.15, 3);
        cameraTarget = new THREE.Vector3(0, 0, 0);

        //scene
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x72645b, 2, 15);


        // Ground
        var plane = new THREE.Mesh(
        new THREE.PlaneBufferGeometry(40, 40),
        new THREE.MeshPhongMaterial({color: 0x999999, specular: 0x101010}));
        plane.rotation.x = -Math.PI/2;
        plane.position.y = -0.5;
        scene.add(plane);
        plane.receiveShadow = true;

        // Lights
        scene.add(new THREE.HemisphereLight(0x443333, 0x111122));
        addShadowedLight(1, 1, 1, 0xffffff, 1.35);
        addShadowedLight(0.5, 1, -1, 0xffaa00, 1);

        // renderer
        renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setClearColor(scene.fog.color);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        window.addEventListener('resize', onWindowResize, false);
        
        // controls
        controls = new OrbitControls( camera, renderer.domElement );
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.minDistance = 2;
        controls.maxDistance = 7;
        controls.maxPolarAngle = Math.PI/2;

      }

      function addShadowedLight(x, y, z, color, intensity) {
        var directionalLight = new THREE.DirectionalLight(color, intensity);
        directionalLight.position.set(x, y, z);
        scene.add(directionalLight);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      function animate() {

             requestAnimationFrame( function render(t) {                
            controls.update();
            camera.lookAt(cameraTarget);
            renderer.render(scene, camera);
            });

        }


      window.onload = function() {
        //get spaceport containers
        function loadNextContainer(){
         var url = "http://192.168.56.1:8080/audios/audio_file_part"+numberContainer;
        // var url = "sample_videos/container_"+ numberContainer; 
       // var url ="https://github.com/ant-media/spaceport-web-player/tree/master/sample_videos/container_"+numberContainer; 
        if(numberContainer>2){
          return; 
        }       
        fetch(url)
        .then(response => response.blob())
        .then(data =>  {  
            var reader = new FileReader();
             reader.onload = function(e) {

            console.log(reader.result);  
            var tmp = new Uint8Array(mainArray.byteLength + reader.result.byteLength);  
            tmp.set(new Uint8Array(mainArray), 0);
            tmp.set(new Uint8Array(reader.result), mainArray.byteLength);
            mainArray=tmp;     
            console.log(tmp); 
            // var frameCount = reader.result
            // var byteArray = new BigUint64Array(frameCount);
            // var frameNumber = Number(byteArray[0]);
            numberContainer++;
            loadNextContainer();
           

          }
             reader.readAsArrayBuffer(data);
         })
        .catch((error) => {
           console.error('Error:', error);
           });   
            }
       init();
       loadNextContainer();
       animate();
       const play = document.querySelector('.play');
       // play.setAttribute('disabled', 'disabled');

       play.onclick = function() {
         playAudio();
        
    };
      
       
       
    

   var volumeSeq=0;
   function playAudio(){
       source = audioCtx.createBufferSource();
               console.log(mainArray.buffer);
               var audioData = mainArray.buffer;
               
      audioCtx.decodeAudioData(audioData, function(buffer){
        source.buffer = buffer;
        console.log(buffer);
       
        source.connect(audioCtx.destination);
        source.loop = false;
        source.start(0);      
      },      function(e){ console.log("Error with decoding audio data" + e.err); });

    };
      }
    </script>
